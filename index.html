    <!-- Open Graph -->
    <meta property="og:title" content="BinBox Games - 하이퍼캐주얼 미니 게임">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="BinBox Games - 하이퍼캐주얼 미니 게임">
    <meta name="twitter:description" content="다양한 하이퍼캐주얼 미니 웹게임들을 즐겨보세요!">
    <meta name="twitter:image" content="https://binboxgames.com/images/og-image.png">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <!-- Google Fonts (async, non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"></noscript>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1398958608599791"
     crossorigin="anonymous"></script>
</head>
<body>
    <!-- Skip Navigation -->
    <a href="#main-content" class="skip-link">메인 콘텐츠로 건너뛰기</a>

    <!-- Language Selector -->
    <div class="language-selector">
        <select id="languageSelect" aria-label="언어 선택">
            <option value="ko">🇰🇷</option>
            <option value="en">🇺🇸</option>
            <option value="ja">🇯🇵</option>
        </select>
    </div>

    <header class="header">
        <div class="container">
            <h1 class="logo" data-i18n="site.title">🎮 BinBox Games</h1>
            <p class="tagline" data-i18n="site.tagline">하이퍼캐주얼 미니 게임의 세계로 오세요!</p>
        </div>
    </header>

    <main class="main" id="main-content">
        <div class="container">
            <section class="hero">
                <h2 data-i18n="hero.title">게임을 선택하고 즐겨보세요!</h2>
                <p data-i18n="hero.subtitle">각 게임은 독립적으로 실행되며, 언제든지 다른 게임으로 전환할 수 있습니다.</p>
            </section>

            <!-- Search Section -->
            <section class="search-section">
                <div class="search-container">
                    <input type="text" id="gameSearch" class="search-input" placeholder="게임 검색..." data-i18n-placeholder="games.search_placeholder" aria-label="게임 검색">
                    <div class="search-icon">🔍</div>
                </div>
            </section>

            <section class="games-grid">
                <h3 data-i18n="games.title">🎯 게임 목록</h3>
                <div class="games-container" id="gamesContainer">
                    <!-- 게임들이 동적으로 생성됩니다 -->
                </div>
                
                <!-- No Results Message -->
                <div class="no-results" id="noResults" style="display: none;">
                    <p data-i18n="games.no_results">검색 결과가 없습니다.</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p data-i18n="footer.copyright">&copy; 2025 PlayGround. 하이퍼캐주얼 미니 게임의 세계를 만들어갑니다.</p>
        </div>
    </footer>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "BinBox Games",
        "url": "https://binboxgames.com/",
        "description": "다양한 하이퍼캐주얼 미니 웹게임들을 즐겨보세요!",
        "inLanguage": ["ko", "en", "ja"],
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://binboxgames.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/gameRegistry.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
