name: Supabase Keep-Alive

on:
  schedule:
    # 매일 09:00 UTC 실행 (Supabase 7일 비활성 pause 방지)
    - cron: '0 9 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  ping-card-battle:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Card Battle Game Supabase
        env:
          SUPABASE_URL: ${{ secrets.CARD_BATTLE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.CARD_BATTLE_SUPABASE_ANON_KEY }}
          SUPABASE_TABLE: ${{ secrets.CARD_BATTLE_SUPABASE_TABLE }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.CARD_BATTLE_SUPABASE_PROJECT_REF }}
        run: |
          # Step 1: REST API ping (retry 3회, 각 5초 대기)
          CURL_EXIT=0
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 3 --retry-delay 5 --retry-all-errors \
            --max-time 30 \
            "${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}") || CURL_EXIT=$?

          if [ "$CURL_EXIT" -eq 0 ] && [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Card Battle Supabase is alive (HTTP $HTTP_CODE)"
            exit 0
          fi

          echo "REST API ping failed (HTTP: $HTTP_CODE, curl exit: $CURL_EXIT)"

          # Step 2: Management API로 프로젝트 상태 확인 및 자동 복구
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Auto-restore unavailable: set SUPABASE_ACCESS_TOKEN and CARD_BATTLE_SUPABASE_PROJECT_REF secrets"
            exit 1
          fi

          STATUS=$(curl -s --max-time 15 \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            | jq -r '.status // "unknown"')

          echo "Project status: $STATUS"

          if [ "$STATUS" = "INACTIVE" ] || [ "$STATUS" = "PAUSED" ]; then
            echo "Project is paused. Restoring..."
            RESTORE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/restore" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}")

            if [ "$RESTORE_CODE" -ge 200 ] && [ "$RESTORE_CODE" -lt 300 ]; then
              echo "Project restore initiated (HTTP $RESTORE_CODE). Takes a few minutes."
              exit 0
            else
              echo "Restore failed (HTTP $RESTORE_CODE)"
              exit 1
            fi
          fi

          echo "Project not paused (status: $STATUS) but ping failed"
          exit 1
